name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies and run tests
        #   working-directory: backend --> no needed because of cd backend below
        run: |
          cd backend
          pip install -r requirements.txt && pip install coverage
          python -m unittest tests.tests
          coverage report

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker build -t anagram-backend ./backend
          docker build -t anagram-frontend ./frontend
